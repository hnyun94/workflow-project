version: '3.8'

services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:15
    container_name: supplies_db
    environment:
      POSTGRES_DB: supplies_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - supplies_network

  # FastAPI 백엔드
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplies_backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/supplies_db
      - SECRET_KEY=your-super-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - supplies_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # React 프론트엔드 (Lovable에서 내보낸 코드)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supplies_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - supplies_network

volumes:
  postgres_data:

networks:
  supplies_network:
    driver: bridge
